<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Logo Final: Comunidad - Refinado -->
  <!-- Niño al centro (coral), equipo protector (teal), arco de conexión -->

  <!-- Arco protector inferior - la base/comunidad -->
  <path d="M12 33c3 4 6.5 6 12 6s9-2 12-6" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Persona izquierda (profesional) -->
  <circle cx="15" cy="22" r="3" fill="#0f766e"/>
  <path d="M15 25c0 0 2.5 2.5 5 3.5" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>

  <!-- Persona derecha (profesional/familia) -->
  <circle cx="33" cy="22" r="3" fill="#0f766e"/>
  <path d="M33 25c0 0-2.5 2.5-5 3.5" stroke="#0f766e" stroke-width="2" stroke-linecap="round"/>

  <!-- Niño central (protagonista) - más grande, color diferenciador -->
  <circle cx="24" cy="18" r="4" fill="#f97316"/>
  <path d="M24 22v6" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Brazos del niño -->
  <path d="M21 25l-1 2" stroke="#f97316" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M27 25l1 2" stroke="#f97316" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Destellos de progreso (3 puntos ascendentes) -->
  <circle cx="21" cy="11" r="1.2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="24" cy="9" r="1.5" fill="#14b8a6" opacity="0.7"/>
  <circle cx="27" cy="11" r="1.2" fill="#14b8a6" opacity="0.5"/>
</svg>
